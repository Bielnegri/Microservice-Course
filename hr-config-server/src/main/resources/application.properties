spring.application.name=hr-config-server
server.port=8888

## Git configuration ##
spring.cloud.config.server.git.uri=https://github.com/Bielnegri/Microservice-Course-Configs
spring.cloud.config.server.git.username=${GITHUB_USER}
spring.cloud.config.server.git.password=${GITHUB_PASS}
spring.cloud.config.server.git.default-label=main

## Actuator configuration ##
management.endpoints.web.exposure.include=health,refresh
management.endpoint.health.show-details=always