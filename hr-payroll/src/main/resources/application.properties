spring.application.name=hr-payroll
server.port=${PORT:0}

eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

## Eureka configuration ##
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

## Timeout configuration ##
spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.timelimiter.configs.default.timeoutDuration=60000
resilience4j.timelimiter.configs.default.cancelRunningFuture=true
spring.cloud.openfeign.client.config.default.connectTimeout=10000
spring.cloud.openfeign.client.config.default.readTimeout=20000